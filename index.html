<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>M33TMAG3</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{

background:
linear-gradient(#000,#fff);

text-align:center;

margin:0;

padding:0;

font-family:sans-serif;

}

h1{

color:white;

text-shadow:
1px 1px 2px #ccc;

margin-top:40px;

}

input{

padding:10px;

font-size:16px;

border-radius:8px;

border:1px solid #ccc;

margin:5px;

width:200px;

}

button{

padding:10px 20px;

font-size:16px;

border-radius:8px;

cursor:pointer;

margin:5px;

}

button:hover{

background:#3248a8;

color:white;

}

#videos{

margin-top:20px;

}

video{

width:40%;

border-radius:12px;

margin:10px;

}

/* version tag */

#versionTag{

display:none;

background:#00ff99;

color:black;

font-weight:bold;

padding:10px 18px;

border-radius:12px;

margin:auto;

margin-top:10px;

width:max-content;

box-shadow:
0 0 12px rgba(0,0,0,0.3);

}

</style>

</head>

<body>

<h1>INITIAL</h1>

<h1>M33T MAG3</h1>

<h1>STRING DIALER</h1>

<p>
INITIATE A SESSION
OR JOIN ONE
WITH A STRING
</p>

<button id="createBtn">
INITIATE
</button>

<br>

<input
id="joinCode"
placeholder="ENTER STRING"
>

<button id="joinBtn">
JOIN
</button>

<div
id="meeting"
style="display:none"
>

<h2 id="roomTitle"></h2>

<div id="versionTag">
USING NEWER VERSION
</div>

<div id="videos">

<video
id="localVideo"
autoplay
muted
></video>

<video
id="remoteVideo"
autoplay
></video>

</div>

</div>

<script>

let localStream;
let peer;
let call;

/* VERSION SYSTEM */

const VERSION =

location.hostname ===
"freestarget.wiliamfashing.com"

? 2

: 1;

/* camera */

async function startCamera(){

localStream =

await navigator.mediaDevices

.getUserMedia({

video:true,
audio:true

});

localVideo.srcObject =
localStream;

}

/* show UI */

function showMeetingUI(code){

document
.querySelectorAll("h1")
.forEach(
e=>e.style.display="none"
);

document
.querySelector("p")
.style.display="none";

createBtn.style.display="none";
joinCode.style.display="none";
joinBtn.style.display="none";

meeting.style.display="block";

roomTitle.innerText =
"STRING: "+code;

}

/* show version warning */

function showNewerTag(remoteVersion){

versionTag.innerText =
"USING NEWER VERSION ("+
remoteVersion+
")";

versionTag.style.display=
"block";

}

/* CREATE ROOM */

createBtn.onclick = async ()=>{

const code =

Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

showMeetingUI(code);

await startCamera();

/* host peer */

peer =
new Peer(code);

/* when someone calls */

peer.on(
"call",
(incoming)=>{

const remoteVersion =
incoming.metadata
? incoming.metadata.version
: 1;

/* show tag if caller newer */

if(
remoteVersion > VERSION
){

showNewerTag(
remoteVersion
);

}

/* answer */

incoming.answer(
localStream,
{
metadata:{
version:VERSION
}
}
);

/* video */

incoming.on(
"stream",
(remoteStream)=>{

remoteVideo.srcObject =
remoteStream;

}

);

}

);

/* show string */

peer.on(
"open",
()=>{

alert(
"YOUR SESSION STRING "+
code
);

}

);

};

/* JOIN ROOM */

joinBtn.onclick =
async ()=>{

const code =
joinCode.value
.trim()
.toUpperCase();

if(!code)

return alert(
"ENTER A SESSION STRING"
);

showMeetingUI(code);

await startCamera();

/* join peer */

peer =
new Peer();

/* connect */

peer.on(
"open",
()=>{

call =
peer.call(

code,
localStream,

{
metadata:{
version:VERSION
}
}

);

/* detect host version */

call.on(
"stream",
(remoteStream)=>{

remoteVideo.srcObject =
remoteStream;

}

);

/* check host metadata */

if(
call.metadata &&
call.metadata.version > VERSION
){

showNewerTag(
call.metadata.version
);

}

}

);

};

</script>

</body>
</html>
