<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M33TMAG3</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
background:linear-gradient(#000,#fff);
text-align:center;
margin:0;
padding:0;
}

h1{
color:#fff;
text-shadow:1px 1px 2px #ccc;
margin-top:40px;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#3248a8;
color:#fff;
}

#videos{
margin-top:20px;
}

video{
width:40%;
border-radius:12px;
margin:10px;
}

/* TAG */

#versionTag{

display:none;
background:#00ff99;
color:#000;
font-weight:bold;
padding:8px 14px;
border-radius:10px;
margin:auto;
margin-top:10px;
width:max-content;

box-shadow:0 0 12px rgba(0,0,0,0.25);

}

</style>
</head>

<body>

<h1>INITIAL</h1>
<h1>M33T MAG3</h1>
<h1>STRING DIALER</h1>

<p>INITIATE A SESSION OR JOIN ONE WITH A STRING</p>

<button id="createBtn">INITIATE</button>
<br>

<input id="joinCode" placeholder="ENTER STRING">

<button id="joinBtn">JOIN</button>

<div id="meeting" style="display:none">

<h2 id="roomTitle"></h2>

<div id="versionTag">

USING NEWER VERSION

</div>

<div id="videos">

<video id="localVideo" autoplay muted></video>

<video id="remoteVideo" autoplay></video>

</div>

</div>

<script>

let localStream;
let peer;
let call;

/* detect version */

const IS_NEW_VERSION =

location.hostname
.includes("freestarget.wiliamfashing.com");

/* camera */

async function startCamera(){

localStream =
await navigator.mediaDevices
.getUserMedia({

video:true,
audio:true

});

document
.getElementById("localVideo")
.srcObject = localStream;

}

/* UI */

function showMeetingUI(code){

document
.querySelectorAll("h1")
.forEach(e=>e.style.display="none");

document
.querySelector("p")
.style.display="none";

createBtn.style.display="none";

joinCode.style.display="none";

joinBtn.style.display="none";

meeting.style.display="block";

roomTitle.innerText =
"STRING: "+code;

/* show tag immediately if new version */

if(IS_NEW_VERSION){

showNewTag();

}

}

/* show tag */

function showNewTag(){

document
.getElementById("versionTag")
.style.display="block";

}

/* CREATE */

createBtn.onclick = async ()=>{

const code =
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

showMeetingUI(code);

await startCamera();

peer = new Peer(code);

peer.on("call",(incoming)=>{

/* detect version of caller */

if(

incoming.metadata &&
incoming.metadata.version==="new"

){

showNewTag();

}

/* answer with metadata */

incoming.answer(

localStream,

{

metadata:{

version:
IS_NEW_VERSION
? "new"
: "legacy"

}

}

);

incoming.on("stream",(remoteStream)=>{

remoteVideo.srcObject =
remoteStream;

});

});

peer.on("open",()=>{

alert(
"YOUR SESSION STRING "+
code

);

});

};

/* JOIN */

joinBtn.onclick = async ()=>{

const code =
joinCode.value
.trim()
.toUpperCase();

if(!code)

return alert(
"ENTER A SESSION STRING"
);

showMeetingUI(code);

await startCamera();

peer = new Peer();

peer.on("open",()=>{

call = peer.call(

code,
localStream,

{

metadata:{

version:
IS_NEW_VERSION
? "new"
: "legacy"

}

}

);

/* detect host version */

call.on("stream",(remoteStream)=>{

remoteVideo.srcObject =
remoteStream;

});

/* show tag if new version */

if(IS_NEW_VERSION){

showNewTag();

}

});

};

</script>

</body>
</html>
